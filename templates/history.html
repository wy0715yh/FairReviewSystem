<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审查历史 - 法律合同风险智能审查助手</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .history-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .history-header h1 {
            color: white;
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .history-list {
            display: grid;
            gap: 15px;
        }
        .history-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .history-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .history-card-title {
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .history-card-time {
            font-size: 13px;
            color: #94a3b8;
        }
        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 18px;
        }
        /* 详情模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }
        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            margin: 0;
            color: #1e293b;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .detail-section {
            margin-bottom: 20px;
        }
        .detail-section h4 {
            color: #475569;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .detail-content {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            color: #334155;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .detail-result {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 8px;
            color: #334155;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="history-container">
        <div class="history-header">
            <h1><i class="fa-solid fa-clock-rotate-left"></i> 审查历史</h1>
            <button class="back-btn" onclick="window.location.href='/'">
                <i class="fa-solid fa-arrow-left"></i> 返回首页
            </button>
        </div>
        <div id="history-list" class="history-list">
            <div class="empty-state">
                <i class="fa-solid fa-clock"></i>
                <p>暂无历史记录</p>
            </div>
        </div>
    </div>

    <!-- 详情模态框 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>审查详情</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="detail-section">
                    <h4>审查内容</h4>
                    <div class="detail-content" id="detail-content"></div>
                </div>
                <div class="detail-section">
                    <h4>审查结果</h4>
                    <div class="detail-result" id="detail-result"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                const list = document.getElementById('history-list');

                if (data.history && data.history.length > 0) {
                    list.innerHTML = data.history.map(h => `
                        <div class="history-card" onclick="viewDetail(${h.id})">
                            <div class="history-card-title">${h.title}</div>
                            <div class="history-card-time">${h.time}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error("加载历史记录失败:", e);
            }
        }

        async function viewDetail(id) {
            try {
                const res = await fetch('/api/history/' + id);
                const data = await res.json();
                if (data.record) {
                    document.getElementById('detail-content').textContent = data.record.content;
                    document.getElementById('detail-result').innerHTML = data.record.result;
                    document.getElementById('modal').classList.add('active');
                }
            } catch (e) {
                alert("加载详情失败");
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // 点击遮罩关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        loadHistory();
    </script>
</body>
</html>
