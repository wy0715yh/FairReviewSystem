<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公平竞争智能审查系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fa-solid fa-scale-balanced"></i>
                <h2>智审中心</h2>
            </div>

            <nav class="nav-menu">
                <button class="nav-item active" onclick="switchTab('audit-panel')">
                    <i class="fa-solid fa-shield-halved"></i> 业务审查端
                </button>
                <button class="nav-item" onclick="switchTab('ip-panel')">
                    <i class="fa-solid fa-book-open"></i> 知识产权助手
                </button>
                <button class="nav-item" onclick="switchTab('admin-panel')">
                    <i class="fa-solid fa-user-gear"></i> 管理维护端
                </button>
            </nav>

            <div class="status-card">
                <h3>🚀 系统状态</h3>
                <p><i class="fa-solid fa-bolt"></i> 引擎：Qwen-Plus</p>
                <p><i class="fa-solid fa-server"></i> 模式：Local RAG</p>
                <p><i class="fa-solid fa-memory"></i> 显存：保护中</p>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1>公平竞争智能审查辅助系统</h1>
            </header>

            <section id="audit-panel" class="panel active">
                <div class="split-view">
                    <div class="card input-card">
                        <h3><i class="fa-solid fa-pen-nib"></i> 录入待审材料</h3>
                        <textarea id="audit-text" placeholder="在此粘贴政策草案文本..."></textarea>
                        <div class="file-upload-wrapper">
                            <label for="audit-file">📄 上传文档 (PDF/DOCX)</label>
                            <input type="file" id="audit-file" accept=".pdf,.docx">
                            <span id="file-name-display">未选择文件</span>
                            <button type="button" id="clear-file-btn" class="clear-file-btn hidden" onclick="clearSelectedFile()">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                        <button class="action-btn" onclick="startAudit()">🚀 启动全维度审查</button>
                    </div>

                    <div class="card output-card">
                        <h3><i class="fa-solid fa-chart-pie"></i> 智能审查报告</h3>
                        <div id="audit-result" class="result-box">
                            <div class="placeholder-text">💡 请在左侧提交内容后开始审查...</div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="ip-panel" class="panel">
                <div class="card chat-card">
                    <h3><i class="fa-solid fa-comments"></i> 知识产权 AI 顾问</h3>
                    <div id="chat-history" class="chat-box"></div>
                    <div class="chat-input-area">
                        <input type="text" id="ip-query" placeholder="输入专利或商标疑问...">
                        <button onclick="sendIpQuery()"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </section>

            <section id="admin-panel" class="panel">
                <div id="login-view" class="card login-card">
                    <h3>🔐 管理员验证</h3>
                    <input type="password" id="admin-pwd" placeholder="请输入管理员密码">
                    <button class="action-btn" onclick="adminLogin()">解锁权限</button>
                </div>

                <div id="admin-view" class="split-view hidden">
                    <div class="card admin-card-layout">
                        <h3>📥 规则库更新</h3>

                        <div id="drop-area" class="upload-zone">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <p>点击此处 或 将文件拖拽至此</p>
                            <p class="sub-text">支持 .txt .pdf .docx</p>
                            <input type="file" id="rule-files" multiple hidden>
                        </div>

                        <div id="file-preview" class="file-preview-list"></div>

                        <button class="action-btn bottom-btn" onclick="uploadRules()">开始向量化入库</button>
                    </div>

                    <div class="card">
                        <h3>📂 现有规则清单</h3>
                        <ul id="rule-list" class="list-group">
                            </ul>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
